name: Deploy Design Gallery to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mockup-viewer
        run: npm install

      - name: Build gallery
        working-directory: mockup-viewer
        run: npm run build

      - name: Copy HTML mockups to dist for serving
        run: |
          find designs -name '*.html' | while read f; do
            dest="mockup-viewer/dist/$f"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mockup-viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

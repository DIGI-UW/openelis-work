<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalog Subscriptions — OpenELIS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: #161616; background: #f4f4f4; }

  .shell-header { background: #161616; color: #fff; height: 48px; display: flex; align-items: center; padding: 0 1rem; gap: 1.5rem; position: sticky; top: 0; z-index: 100; }
  .shell-header .logo { font-size: 14px; font-weight: 600; color: #fff; }
  .shell-header nav { display: flex; height: 48px; }
  .shell-header nav a { color: #c6c6c6; font-size: 14px; padding: 0 1rem; display: flex; align-items: center; text-decoration: none; border-bottom: 2px solid transparent; }
  .shell-header nav a.active { color: #fff; border-bottom-color: #0f62fe; }
  .shell-header nav a:hover { background: #393939; color: #fff; }

  .page-body { display: flex; min-height: calc(100vh - 48px); }

  /* Side Nav */
  .side-nav { width: 256px; background: #fff; border-right: 1px solid #e0e0e0; padding-top: 1rem; flex-shrink: 0; }
  .snav-section { font-size: 11px; font-weight: 600; color: #6f6f6f; text-transform: uppercase; letter-spacing: .08em; padding: .75rem 1rem .25rem; margin-top: .5rem; }
  .snav-item { display: flex; align-items: center; justify-content: space-between; padding: .5rem 1rem; font-size: 14px; color: #525252; cursor: pointer; border-left: 2px solid transparent; text-decoration: none; }
  .snav-item:hover { background: #e8e8e8; color: #161616; }
  .snav-item.open { background: #e8e8e8; color: #161616; font-weight: 500; border-left-color: #0f62fe; }
  .snav-sub { background: #f4f4f4; }
  .snav-sub-item { display: flex; align-items: center; justify-content: space-between; padding: .4rem 1rem .4rem 2rem; font-size: 13px; color: #525252; cursor: pointer; border-left: 2px solid transparent; }
  .snav-sub-item:hover { background: #e8e8e8; color: #161616; }
  .snav-sub-item.active { color: #161616; border-left-color: #0f62fe; background: #e8e8e8; font-weight: 500; }
  .badge-red { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; font-size: 11px; font-weight: 600; background: #da1e28; color: #fff; }

  /* Main */
  .main { flex: 1; padding: 2rem; min-width: 0; }
  .breadcrumb { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; font-size: 12px; color: #6f6f6f; }
  .breadcrumb a { color: #0f62fe; text-decoration: none; cursor: pointer; }
  .page-title { font-size: 28px; font-weight: 300; margin-bottom: .25rem; }
  .page-sub { font-size: 13px; color: #6f6f6f; margin-bottom: 1.5rem; }

  /* Hub status banner */
  .hub-banner { display: flex; align-items: center; gap: 1rem; padding: .75rem 1rem; background: #defbe6; border-left: 3px solid #198038; margin-bottom: 1.5rem; font-size: 13px; }
  .hub-banner.disconnected { background: #f4f4f4; border-left-color: #8d8d8d; color: #525252; }
  .hub-banner-icon { font-size: 16px; }
  .hub-banner strong { color: #0e6027; }
  .hub-banner.disconnected strong { color: #525252; }
  .hub-banner-actions { margin-left: auto; display: flex; gap: .5rem; }

  /* Card */
  .card { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border-bottom: 1px solid #e0e0e0; background: #f4f4f4; flex-wrap: wrap; }
  .search-input { height: 40px; border: none; border-bottom: 1px solid #8d8d8d; padding: 0 1rem; font-size: 14px; font-family: inherit; background: #fff; flex: 1; min-width: 180px; max-width: 300px; outline: none; }
  .search-input:focus { border-bottom-color: #0f62fe; box-shadow: 0 1px 0 #0f62fe; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: .5rem; padding: 0 1rem; height: 40px; font-size: 14px; font-family: inherit; font-weight: 400; cursor: pointer; border: none; white-space: nowrap; }
  .btn-sm { height: 32px; font-size: 12px; padding: 0 .75rem; }
  .btn-xs { height: 28px; font-size: 12px; padding: 0 .625rem; }
  .btn-primary { background: #0f62fe; color: #fff; }
  .btn-primary:hover { background: #0353e9; }
  .btn-secondary { background: #393939; color: #fff; }
  .btn-secondary:hover { background: #4c4c4c; }
  .btn-ghost { background: transparent; color: #0f62fe; }
  .btn-ghost:hover { background: #e8e8e8; }
  .btn-ghost-gray { background: transparent; color: #525252; }
  .btn-ghost-gray:hover { background: #e8e8e8; }
  .btn-danger { background: #da1e28; color: #fff; }
  .btn-danger:hover { background: #ba1b23; }
  .btn-tertiary { background: transparent; color: #0f62fe; border: 1px solid #0f62fe; }
  .btn-tertiary:hover { background: #e8e8e8; }
  .btn-outline { background: transparent; border: 1px solid #c6c6c6; color: #525252; }
  .btn-outline:hover { background: #e8e8e8; }
  .btn-icon { width: 32px; padding: 0; justify-content: center; }

  /* Tables */
  .data-table { width: 100%; border-collapse: collapse; background: #fff; }
  .data-table th { font-size: 12px; font-weight: 600; color: #525252; text-align: left; padding: .625rem 1rem; background: #e0e0e0; border-bottom: 1px solid #c6c6c6; white-space: nowrap; }
  .data-table td { padding: .75rem 1rem; font-size: 14px; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #e8e8e8; }
  .data-table tr.expanded td { background: #f4f4f4; }
  .data-table tr.expanded:hover td { background: #f4f4f4; }
  .data-table.sm td, .data-table.sm th { padding: .5rem 1rem; font-size: 13px; }
  .data-table input[type=checkbox] { width: 16px; height: 16px; accent-color: #0f62fe; }

  /* Registry table extras */
  .catalog-desc { font-size: 12px; color: #525252; margin-top: 3px; }
  .catalog-publisher { font-size: 12px; color: #6f6f6f; }
  .already-subscribed { font-size: 12px; color: #198038; display: flex; align-items: center; gap: 4px; }

  /* Tags */
  .tag { display: inline-flex; align-items: center; height: 24px; padding: 0 .5rem; border-radius: 12px; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .tag-sm { height: 18px; font-size: 11px; }
  .tag-green { background: #defbe6; color: #0e6027; }
  .tag-red { background: #fff1f1; color: #750e13; }
  .tag-blue { background: #edf5ff; color: #0043ce; }
  .tag-teal { background: #d9fbfb; color: #005d5d; }
  .tag-purple { background: #f6f2ff; color: #491d8b; }
  .tag-warm-gray { background: #f5f5f0; color: #565151; }
  .tag-gray { background: #e0e0e0; color: #525252; }
  .tag-cyan { background: #e5f6ff; color: #00539a; }

  /* Notifications */
  .notif { display: flex; align-items: flex-start; gap: .75rem; padding: .875rem 1rem; margin-bottom: 1rem; border-left: 3px solid; font-size: 14px; }
  .notif-success { background: #defbe6; border-color: #198038; }
  .notif-error { background: #fff1f1; border-color: #da1e28; }
  .notif-info { background: #edf5ff; border-color: #0f62fe; }
  .notif-warning { background: #fff8f1; border-color: #ff832b; }
  .notif-close { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 14px; color: #525252; flex-shrink: 0; }

  /* Toggle */
  .toggle-wrap { display: flex; align-items: center; gap: .4rem; }
  .tl { font-size: 11px; min-width: 34px; }
  .tl.r { text-align: right; color: #da1e28; font-weight: 500; }
  .tl.a { color: #198038; font-weight: 500; }
  .tl.off { color: #8d8d8d; }
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .ts { position: absolute; inset: 0; background: #8d8d8d; border-radius: 10px; cursor: pointer; transition: .2s; }
  .ts::before { content:''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .ts { background: #0f62fe; }
  .toggle input:checked + .ts::before { transform: translateX(16px); }

  /* Form */
  .form-panel { padding: 1rem 1.5rem; background: #f4f4f4; border-top: 2px solid #0f62fe; }
  .form-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr 0.8fr; gap: 1rem; align-items: start; }
  .form-field { display: flex; flex-direction: column; gap: .25rem; }
  .form-label { font-size: 12px; font-weight: 600; color: #525252; }
  .form-input { height: 40px; border: none; border-bottom: 1px solid #8d8d8d; padding: 0 1rem; font-size: 14px; font-family: inherit; background: #fff; outline: none; width: 100%; }
  .form-input:focus { border-bottom-color: #0f62fe; box-shadow: 0 1px 0 #0f62fe; }
  .form-number { display: flex; }
  .form-number input { flex: 1; border: 1px solid #8d8d8d; border-right: none; padding: 0 .75rem; font-size: 14px; font-family: inherit; height: 40px; outline: none; background: #fff; }
  .form-number-btns { display: flex; flex-direction: column; }
  .form-number-btns button { width: 32px; flex: 1; border: 1px solid #8d8d8d; background: #e0e0e0; cursor: pointer; font-size: 10px; }
  .form-number-btns button:hover { background: #c6c6c6; }
  .cbox-group { display: flex; flex-direction: column; gap: .5rem; margin-top: .25rem; }
  .cbox-item { display: flex; align-items: center; gap: .5rem; font-size: 14px; cursor: pointer; }
  .cbox-item input { width: 16px; height: 16px; accent-color: #0f62fe; cursor: pointer; }
  .form-actions { display: flex; gap: .5rem; margin-top: 1rem; }

  /* Diff */
  .diff-panel { padding: 1rem 1.5rem; background: #f4f4f4; }
  .diff-actions { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }

  /* Accordion */
  .accordion { border: 1px solid #e0e0e0; margin-bottom: 1rem; }
  .accordion-hdr { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; user-select: none; }
  .accordion-hdr:hover { background: #e8e8e8; }
  .accordion-body { border-top: 1px solid #e0e0e0; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(22,22,22,.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; width: 480px; max-width: 90vw; }
  .modal-hdr { padding: 1rem 1.5rem; background: #da1e28; color: #fff; }
  .modal-hdr h2 { font-size: 16px; font-weight: 400; }
  .modal-body { padding: 1.5rem; font-size: 14px; line-height: 1.5; }
  .modal-footer { display: flex; justify-content: flex-end; border-top: 1px solid #e0e0e0; }
  .modal-footer .btn { height: 48px; }

  /* Disambig */
  .disambig { padding: 1rem; background: #fff8f1; border: 1px solid #ff832b; margin-bottom: 1rem; }
  .disambig-title { display: flex; align-items: center; gap: .5rem; font-weight: 600; margin-bottom: .5rem; color: #8a3800; }

  /* Batch */
  .batch-bar { background: #393939; color: #fff; padding: 0 1rem; height: 48px; display: flex; align-items: center; gap: 1rem; }

  /* Registry drawer */
  .registry-drawer { background: #fff; border: 1px solid #e0e0e0; border-top: 2px solid #0f62fe; margin-bottom: 1px; }
  .registry-drawer-hdr { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: #0f62fe; color: #fff; }
  .registry-drawer-hdr h3 { font-size: 14px; font-weight: 500; }
  .registry-filter-bar { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border-bottom: 1px solid #e0e0e0; background: #f4f4f4; }
  .registry-filter-bar input { height: 36px; border: none; border-bottom: 1px solid #8d8d8d; padding: 0 .75rem; font-size: 13px; font-family: inherit; background: #fff; outline: none; flex: 1; max-width: 280px; }
  .registry-filter-bar select { height: 36px; border: 1px solid #8d8d8d; padding: 0 .5rem; font-size: 13px; font-family: inherit; background: #fff; outline: none; cursor: pointer; }
  .registry-meta { font-size: 12px; color: #6f6f6f; margin-left: auto; }
  .manual-link { font-size: 13px; color: #0f62fe; cursor: pointer; padding: .75rem 1rem; display: block; border-top: 1px solid #e0e0e0; text-align: center; background: #f4f4f4; }
  .manual-link:hover { background: #e8e8e8; }

  /* Misc */
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .text-muted { color: #8d8d8d; font-style: italic; }
  .text-upstream { color: #0043ce; font-weight: 500; }
  .err-detail { font-size: 11px; color: #da1e28; margin-top: 3px; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .section-desc { font-size: 13px; color: #525252; padding: 1rem; border-bottom: 1px solid #e0e0e0; background: #fff; }
  .empty-queue { padding: 3rem; text-align: center; color: #6f6f6f; background: #fff; }
  .divider { border: none; border-top: 1px solid #e0e0e0; margin: 0; }
</style>
</head>
<body>

<header class="shell-header">
  <span class="logo">OpenELIS Global</span>
  <nav>
    <a href="#">Orders</a>
    <a href="#">Results</a>
    <a href="#">Validation</a>
    <a href="#">Reports</a>
    <a href="#" class="active">Admin</a>
  </nav>
</header>

<div class="page-body">
  <div id="root" style="display:contents"></div>
</div>

<script type="text/babel">
const { useState, useMemo } = React;

// ── Data ─────────────────────────────────────────────────────────────────────

const HUB_CONNECTED = true; // toggle to false to see disconnected state
const HUB_NAME = 'OpenELIS Community Hub';

const REGISTRY_CATALOGS = [
  {
    id: 'r1', name: 'EUCAST Clinical Breakpoints 2026', publisher: 'EUCAST',
    types: ['PlanDefinition'], region: 'Global',
    desc: 'Annual EUCAST breakpoints for antimicrobial susceptibility testing. Covers bacteria, fungi, and mycobacteria.',
    url: 'https://eucast.org/fhir', resourceCount: 142, lastUpdated: '2026-01-15',
  },
  {
    id: 'r2', name: 'WHO Essential Diagnostics List', publisher: 'WHO',
    types: ['ActivityDefinition'], region: 'Global',
    desc: 'WHO-recommended test definitions for essential in vitro diagnostics.',
    url: 'https://catalog.who.int/fhir', resourceCount: 58, lastUpdated: '2025-11-01',
  },
  {
    id: 'r3', name: 'NHLS South Africa Test Catalog', publisher: 'NHLS',
    types: ['ActivityDefinition'], region: 'Africa',
    desc: 'National Health Laboratory Service standardized test catalog for South African facilities.',
    url: 'https://nhls.ac.za/fhir', resourceCount: 310, lastUpdated: '2026-02-10',
  },
  {
    id: 'r4', name: 'INSPC Madagascar Reference Catalog', publisher: 'INSPC Madagascar',
    types: ['ActivityDefinition', 'PlanDefinition'], region: 'Africa',
    desc: 'Institut National de Santé Publique et Communautaire standardized test and rule definitions.',
    url: 'https://inspc.mg/fhir', resourceCount: 87, lastUpdated: '2025-12-20',
  },
  {
    id: 'r5', name: "Côte d'Ivoire LNSP Catalog", publisher: "LNSP Côte d'Ivoire",
    types: ['ActivityDefinition', 'PlanDefinition'], region: 'Africa',
    desc: 'Laboratoire National de Santé Publique standardized catalog for Côte d\'Ivoire facilities.',
    url: 'https://lnsp.ci/fhir', resourceCount: 124, lastUpdated: '2026-01-30',
  },
  {
    id: 'r6', name: 'CBCL West Africa Panels', publisher: 'CBCL',
    types: ['ActivityDefinition'], region: 'Africa',
    desc: 'Centre de Biologie Clinique et de Recherche curated panels for West African clinical labs.',
    url: 'https://cbcl.org/fhir', resourceCount: 44, lastUpdated: '2025-09-14',
  },
  {
    id: 'r7', name: 'CLSI Reference Intervals', publisher: 'CLSI',
    types: ['ActivityDefinition'], region: 'Global',
    desc: 'CLSI-derived reference intervals and normal ranges for common analytes.',
    url: 'https://clsi.org/fhir', resourceCount: 201, lastUpdated: '2025-08-01',
  },
];

const INIT_SUBS = [
  { id: 1, name: 'EUCAST 2026 Breakpoints', url: 'https://eucast.org/fhir', types: ['PlanDefinition'], interval: 168, lastPolled: '2026-03-22 06:00', status: 'active', registryId: 'r1' },
  { id: 2, name: 'WHO Essential Diagnostics', url: 'https://catalog.who.int/fhir', types: ['ActivityDefinition'], interval: 24, lastPolled: '2026-03-23 06:00', status: 'active', registryId: 'r2' },
  { id: 3, name: 'National Reference Lab – CI', url: 'https://lnsp.ci/fhir', types: ['ActivityDefinition', 'PlanDefinition'], interval: 48, lastPolled: '2026-03-21 06:00', status: 'error', errorMsg: 'HTTP 503 – Service Unavailable', registryId: 'r5' },
];

const INIT_UPDATES = [
  {
    id: 1, name: 'EUCAST TB Breakpoints v6.0', resourceType: 'PlanDefinition', matchType: 'linked',
    subscription: 'EUCAST 2026 Breakpoints', detected: '2026-03-23',
    fields: [{ id: 'f1', label: 'Version', local: '5.0', upstream: '6.0', accepted: null }],
    breakpoints: [
      { id: 'b1', organism: 'M. tuberculosis', drug: 'Isoniazid', cat: 'R', local: '≥0.2', upstream: '≥0.25', tag: 'changed', accepted: null },
      { id: 'b3', organism: 'M. tuberculosis', drug: 'Bedaquiline', cat: 'S', local: null, upstream: '≤0.008', tag: 'new', accepted: null },
    ],
  },
  {
    id: 2, name: 'Malaria RDT (PfHRP2)', resourceType: 'ActivityDefinition', matchType: 'loinc',
    subscription: 'WHO Essential Diagnostics', detected: '2026-03-23',
    fields: [
      { id: 'f3', label: 'Normal Range', local: 'Negative', upstream: 'Non-reactive', accepted: null },
      { id: 'f4', label: 'Result Type', local: 'Text', upstream: 'Coded', accepted: null },
    ],
    breakpoints: [],
  },
  {
    id: 3, name: 'Sickle Cell Screen', resourceType: 'ActivityDefinition', matchType: 'new',
    subscription: 'WHO Essential Diagnostics', detected: '2026-03-23',
    fields: [
      { id: 'f6', label: 'Name', local: '', upstream: 'Sickle Cell Hemoglobin Screen', accepted: null },
      { id: 'f7', label: 'LOINC Code', local: '', upstream: '4625-5', accepted: null },
      { id: 'f8', label: 'Result Type', local: '', upstream: 'Text', accepted: null },
    ],
    breakpoints: [],
  },
  {
    id: 4, name: 'Hepatitis B Surface Antigen', resourceType: 'ActivityDefinition', matchType: 'ambiguous',
    subscription: 'WHO Essential Diagnostics', detected: '2026-03-22',
    fields: [], breakpoints: [],
    candidates: [{ id: 101, name: 'HBsAg (Rapid)', loinc: '5195-3' }, { id: 102, name: 'Hepatitis B sAg', loinc: '5195-3' }],
  },
];

const STATUS_TAG   = { active: 'tag-green', paused: 'tag-warm-gray', syncing: 'tag-blue', error: 'tag-red' };
const STATUS_LABEL = { active: 'Active', paused: 'Paused', syncing: 'Syncing', error: 'Error' };
const MATCH_TAG    = { linked: 'tag-teal', loinc: 'tag-blue', new: 'tag-green', ambiguous: 'tag-red' };
const MATCH_LABEL  = { linked: 'Linked', loinc: 'LOINC Match', new: 'New', ambiguous: 'Ambiguous' };
const BP_TAG       = { new: 'tag-green', changed: 'tag-warm-gray', removed: 'tag-red' };

// ── Small components ──────────────────────────────────────────────────────────

function Notif({ kind, msg, onClose }) {
  const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
  return (
    <div className={`notif notif-${kind}`}>
      <span>{icons[kind]}</span><span>{msg}</span>
      {onClose && <button className="notif-close" onClick={onClose}>✕</button>}
    </div>
  );
}

function FieldToggle({ id, value, onChange }) {
  return (
    <div className="toggle-wrap">
      <span className={`tl ${value === false ? 'r' : 'off'}`} style={{ minWidth: 34, textAlign: 'right' }}>Reject</span>
      <label className="toggle">
        <input type="checkbox" checked={value === true} onChange={e => onChange(e.target.checked)} />
        <span className="ts" />
      </label>
      <span className={`tl ${value === true ? 'a' : 'off'}`}>Accept</span>
    </div>
  );
}

// ── Catalog Registry Drawer ───────────────────────────────────────────────────

function CatalogRegistryDrawer({ subscribedUrls, onSubscribe, onClose, onManual }) {
  const [search, setSearch]   = useState('');
  const [region, setRegion]   = useState('');
  const [type, setType]       = useState('');
  const [justAdded, setJustAdded] = useState(null);

  const filtered = useMemo(() => REGISTRY_CATALOGS.filter(c => {
    const q = search.toLowerCase();
    if (search && !c.name.toLowerCase().includes(q) && !c.publisher.toLowerCase().includes(q)) return false;
    if (region && c.region !== region) return false;
    if (type && !c.types.includes(type)) return false;
    return true;
  }), [search, region, type]);

  const handleSubscribe = (catalog) => {
    onSubscribe(catalog);
    setJustAdded(catalog.id);
    setTimeout(() => setJustAdded(null), 2000);
  };

  return (
    <div className="registry-drawer">
      <div className="registry-drawer-hdr">
        <div>
          <h3>📋 Browse Catalog Registry — {HUB_NAME}</h3>
          <p style={{ fontSize: 12, opacity: .85, marginTop: 2 }}>{REGISTRY_CATALOGS.length} catalogs available · Select one to subscribe</p>
        </div>
        <button className="btn btn-ghost btn-sm" style={{ color: '#fff', border: '1px solid rgba(255,255,255,.4)' }} onClick={onClose}>✕ Close</button>
      </div>

      <div className="registry-filter-bar">
        <input placeholder="Search catalogs or publishers…" value={search} onChange={e => setSearch(e.target.value)} />
        <select value={region} onChange={e => setRegion(e.target.value)}>
          <option value="">All regions</option>
          <option value="Global">Global</option>
          <option value="Africa">Africa</option>
        </select>
        <select value={type} onChange={e => setType(e.target.value)}>
          <option value="">All resource types</option>
          <option value="ActivityDefinition">Tests (ActivityDefinition)</option>
          <option value="PlanDefinition">Clinical Rules (PlanDefinition)</option>
        </select>
        <span className="registry-meta">{filtered.length} result{filtered.length !== 1 ? 's' : ''}</span>
      </div>

      <table className="data-table">
        <thead><tr>
          <th style={{ width: '30%' }}>Catalog</th>
          <th>Publisher</th>
          <th>Resource Types</th>
          <th>Region</th>
          <th>Resources</th>
          <th>Last Updated</th>
          <th style={{ width: 120 }}></th>
        </tr></thead>
        <tbody>
          {filtered.map(c => {
            const alreadySubscribed = subscribedUrls.includes(c.url);
            const wasJustAdded = justAdded === c.id;
            return (
              <tr key={c.id}>
                <td>
                  <div style={{ fontWeight: 500 }}>{c.name}</div>
                  <div className="catalog-desc">{c.desc}</div>
                </td>
                <td><span className="catalog-publisher">{c.publisher}</span></td>
                <td>
                  <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                    {c.types.map(t => <span key={t} className={`tag tag-sm ${t === 'PlanDefinition' ? 'tag-purple' : 'tag-blue'}`}>{t === 'PlanDefinition' ? 'Clinical Rules' : 'Tests'}</span>)}
                  </div>
                </td>
                <td><span className={`tag tag-sm ${c.region === 'Global' ? 'tag-cyan' : 'tag-teal'}`}>{c.region}</span></td>
                <td style={{ fontSize: 13, color: '#525252' }}>{c.resourceCount}</td>
                <td style={{ fontSize: 12, color: '#6f6f6f' }}>{c.lastUpdated}</td>
                <td>
                  {wasJustAdded ? (
                    <span style={{ color: '#198038', fontSize: 13, fontWeight: 500 }}>✓ Subscribed</span>
                  ) : alreadySubscribed ? (
                    <span className="already-subscribed">✓ Subscribed</span>
                  ) : (
                    <button className="btn btn-primary btn-xs" onClick={() => handleSubscribe(c)}>+ Subscribe</button>
                  )}
                </td>
              </tr>
            );
          })}
          {filtered.length === 0 && (
            <tr><td colSpan={7} style={{ textAlign: 'center', padding: '2rem', color: '#6f6f6f', fontStyle: 'italic' }}>No catalogs match your filters.</td></tr>
          )}
        </tbody>
      </table>

      <div className="manual-link" onClick={onManual}>
        Can't find what you need? <strong>Add a custom FHIR endpoint manually →</strong>
      </div>
    </div>
  );
}

// ── Manual Add Form ───────────────────────────────────────────────────────────

function ManualAddForm({ prefill, onSave, onCancel }) {
  const [form, setForm] = useState(
    prefill || { name: '', url: '', interval: 24, actDef: true, planDef: false }
  );
  return (
    <div className="form-panel" style={{ borderTop: prefill ? '2px solid #0f62fe' : '2px solid #6f6f6f' }}>
      <p style={{ fontSize: 12, fontWeight: 600, color: prefill ? '#0f62fe' : '#525252', marginBottom: '1rem' }}>
        {prefill ? `Confirm subscription: ${prefill.name}` : 'Add Custom FHIR Endpoint'}
      </p>
      <div className="form-grid">
        <div className="form-field">
          <label className="form-label">Subscription Name</label>
          <input className="form-input" placeholder="e.g., EUCAST 2026" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
        </div>
        <div className="form-field">
          <label className="form-label">FHIR Base URL</label>
          <input className="form-input" placeholder="https://catalog.example.org/fhir" value={form.url} onChange={e => setForm({...form, url: e.target.value})} />
        </div>
        <div className="form-field">
          <label className="form-label">Resource Types</label>
          <div className="cbox-group">
            <label className="cbox-item"><input type="checkbox" checked={form.actDef} onChange={e => setForm({...form, actDef: e.target.checked})} /> ActivityDefinition (Tests)</label>
            <label className="cbox-item"><input type="checkbox" checked={form.planDef} onChange={e => setForm({...form, planDef: e.target.checked})} /> PlanDefinition (Clinical Rules)</label>
          </div>
        </div>
        <div className="form-field">
          <label className="form-label">Polling Interval (hours)</label>
          <div className="form-number">
            <input type="number" value={form.interval} min={1} max={168} onChange={e => setForm({...form, interval: parseInt(e.target.value)||24})} />
            <div className="form-number-btns">
              <button onClick={() => setForm(f => ({...f, interval: Math.min(168, f.interval+1)}))}>▲</button>
              <button onClick={() => setForm(f => ({...f, interval: Math.max(1, f.interval-1)}))}>▼</button>
            </div>
          </div>
        </div>
      </div>
      <div className="form-actions">
        <button className="btn btn-primary btn-sm" onClick={() => { if (form.name && form.url) onSave(form); }}>Save Subscription</button>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

// ── Subscriptions Page ────────────────────────────────────────────────────────

function SubscriptionsPage() {
  const [subs, setSubs]         = useState(INIT_SUBS);
  const [mode, setMode]         = useState(null); // null | 'registry' | 'manual' | 'manual-prefill'
  const [prefill, setPrefill]   = useState(null);
  const [expanded, setExpanded] = useState(null);
  const [syncing, setSyncing]   = useState(null);
  const [notif, setNotif]       = useState(null);
  const [removeModal, setRemoveModal] = useState(null);

  const subscribedUrls = subs.map(s => s.url);

  const handleRegistrySubscribe = (catalog) => {
    const types = catalog.types;
    const newSub = { id: Date.now(), name: catalog.name, url: catalog.url, types, interval: 24, lastPolled: '—', status: 'active', registryId: catalog.id };
    setSubs(s => [...s, newSub]);
    setNotif({ kind: 'success', msg: `Subscribed to "${catalog.name}".` });
  };

  const handleManualPrefill = (catalog) => {
    setPrefill({ name: catalog.name, url: catalog.url, interval: 24, actDef: catalog.types.includes('ActivityDefinition'), planDef: catalog.types.includes('PlanDefinition') });
    setMode('manual-prefill');
  };

  const syncRow = id => {
    setSyncing(id);
    setTimeout(() => { setSyncing(null); setNotif({ kind: 'success', msg: 'Sync completed. 3 new updates detected.' }); }, 2000);
  };

  return (
    <div>
      {notif && <div style={{ marginBottom: '1rem' }}><Notif kind={notif.kind} msg={notif.msg} onClose={() => setNotif(null)} /></div>}

      {/* Hub connection banner */}
      {HUB_CONNECTED ? (
        <div className="hub-banner">
          <span className="hub-banner-icon">🔗</span>
          <div>
            <strong>Connected to {HUB_NAME}</strong>
            <span style={{ marginLeft: '.75rem', color: '#525252' }}>·</span>
            <span style={{ marginLeft: '.75rem', fontSize: 13, color: '#525252' }}>{REGISTRY_CATALOGS.length} catalogs available · {subs.length} subscribed</span>
          </div>
          <div className="hub-banner-actions">
            <button className="btn btn-primary btn-sm" onClick={() => setMode(mode === 'registry' ? null : 'registry')}>
              {mode === 'registry' ? '▲ Close Registry' : '📋 Browse Catalog Registry'}
            </button>
            <button className="btn btn-outline btn-sm" onClick={() => { setMode('manual'); setPrefill(null); }}>+ Custom Endpoint</button>
          </div>
        </div>
      ) : (
        <div className="hub-banner disconnected">
          <span className="hub-banner-icon" style={{ color: '#8d8d8d' }}>⚬</span>
          <div>
            <strong>Not connected to a hub</strong>
            <span style={{ marginLeft: '.75rem', fontSize: 13 }}>Configure a hub in System Settings to browse available catalogs.</span>
          </div>
          <div className="hub-banner-actions">
            <button className="btn btn-outline btn-sm" onClick={() => { setMode('manual'); setPrefill(null); }}>+ Add Custom Endpoint</button>
          </div>
        </div>
      )}

      {/* Registry drawer */}
      {mode === 'registry' && (
        <CatalogRegistryDrawer
          subscribedUrls={subscribedUrls}
          onSubscribe={handleRegistrySubscribe}
          onClose={() => setMode(null)}
          onManual={() => { setMode('manual'); setPrefill(null); }}
        />
      )}

      {/* Manual add form */}
      {(mode === 'manual' || mode === 'manual-prefill') && (
        <ManualAddForm
          prefill={prefill}
          onSave={form => {
            const types = [form.actDef && 'ActivityDefinition', form.planDef && 'PlanDefinition'].filter(Boolean);
            setSubs([...subs, { id: Date.now(), name: form.name, url: form.url, types, interval: form.interval, lastPolled: '—', status: 'active' }]);
            setMode(null); setPrefill(null);
            setNotif({ kind: 'success', msg: `Subscription "${form.name}" saved.` });
          }}
          onCancel={() => { setMode(null); setPrefill(null); }}
        />
      )}

      <div className="card">
        <p className="section-desc">Active subscriptions are polled on their configured interval. Click ↻ to sync immediately.</p>
        <div className="toolbar">
          <input className="search-input" placeholder="Search subscriptions…" />
          <span style={{ fontSize: 13, color: '#6f6f6f', marginLeft: 'auto' }}>{subs.length} subscription{subs.length !== 1 ? 's' : ''}</span>
        </div>
        <table className="data-table">
          <thead><tr>
            <th>Name</th><th>FHIR Base URL</th><th>Resource Types</th>
            <th>Interval</th><th>Last Polled</th><th>Status</th><th style={{ width: 120 }}></th>
          </tr></thead>
          <tbody>
            {subs.map(s => (
              <React.Fragment key={s.id}>
                <tr className={expanded === s.id ? 'expanded' : ''}>
                  <td>
                    <div style={{ fontWeight: 500 }}>{s.name}</div>
                    {s.registryId && <div style={{ fontSize: 11, color: '#6f6f6f', marginTop: 2 }}>🔗 From registry</div>}
                  </td>
                  <td><span className="mono">{s.url}</span></td>
                  <td>
                    <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                      {s.types.map(t => <span key={t} className="tag tag-sm tag-gray">{t}</span>)}
                    </div>
                  </td>
                  <td>{s.interval}h</td>
                  <td style={{ fontSize: 13 }}>{s.lastPolled}</td>
                  <td>
                    <span className={`tag ${STATUS_TAG[s.status]}`}>{STATUS_LABEL[s.status]}</span>
                    {s.status === 'error' && <div className="err-detail">{s.errorMsg}</div>}
                  </td>
                  <td>
                    <div style={{ display: 'flex', gap: 2 }}>
                      <button className="btn btn-ghost btn-icon btn-sm" title="Check for Updates" style={{ fontSize: 16 }} onClick={() => syncRow(s.id)}>
                        {syncing === s.id ? <span className="spin">↻</span> : '↻'}
                      </button>
                      <button className="btn btn-ghost btn-icon btn-sm" title={s.status === 'paused' ? 'Resume' : 'Pause'} style={{ fontSize: 14 }}
                        onClick={() => setSubs(subs.map(x => x.id === s.id ? {...x, status: x.status === 'paused' ? 'active' : 'paused'} : x))}>
                        {s.status === 'paused' ? '▶' : '⏸'}
                      </button>
                      <button className="btn btn-ghost btn-icon btn-sm" title="Edit" style={{ fontSize: 14 }}
                        onClick={() => setExpanded(e => e === s.id ? null : s.id)}>✎</button>
                      <button className="btn btn-ghost btn-icon btn-sm" title="Remove" style={{ fontSize: 14, color: '#da1e28' }}
                        onClick={() => setRemoveModal(s)}>🗑</button>
                    </div>
                  </td>
                </tr>
                {expanded === s.id && (
                  <tr className="expanded">
                    <td colSpan={7} style={{ padding: 0 }}>
                      <ManualAddForm
                        prefill={{ name: s.name, url: s.url, interval: s.interval, actDef: s.types.includes('ActivityDefinition'), planDef: s.types.includes('PlanDefinition') }}
                        onSave={() => setExpanded(null)}
                        onCancel={() => setExpanded(null)}
                      />
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      {removeModal && (
        <div className="modal-backdrop" onClick={() => setRemoveModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-hdr"><h2>Remove Subscription</h2></div>
            <div className="modal-body">
              <p>Remove this subscription? Pending updates will be discarded. Previously accepted changes will not be affected.</p>
              <p style={{ marginTop: '.75rem', fontWeight: 600 }}>{removeModal.name}</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" style={{ height: 48 }} onClick={() => setRemoveModal(null)}>Cancel</button>
              <button className="btn btn-danger" style={{ height: 48 }} onClick={() => { setSubs(subs.filter(s => s.id !== removeModal.id)); setRemoveModal(null); }}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Diff Panel ────────────────────────────────────────────────────────────────

function DiffPanel({ update, onApply, onClose }) {
  const [fields, setFields]   = useState(update.fields.map(f => ({...f})));
  const [bps, setBps]         = useState(update.breakpoints.map(b => ({...b})));
  const [linked, setLinked]   = useState(update.matchType !== 'ambiguous' ? true : null);
  const [bpOpen, setBpOpen]   = useState(true);
  const [applied, setApplied] = useState(false);

  const setF = (id, v) => setFields(fields.map(f => f.id === id ? {...f, accepted: v} : f));
  const setB = (id, v) => setBps(bps.map(b => b.id === id ? {...b, accepted: v} : b));
  const acceptAll = () => { setFields(fields.map(f => ({...f, accepted: true}))); setBps(bps.map(b => ({...b, accepted: true}))); };
  const rejectAll = () => { setFields(fields.map(f => ({...f, accepted: false}))); setBps(bps.map(b => ({...b, accepted: false}))); };

  if (!linked) return (
    <div className="disambig">
      <div className="disambig-title"><span>⚠</span> Select Matching Local Record</div>
      <p style={{ fontSize: 13, color: '#525252', marginBottom: '1rem' }}>Matched multiple local tests by LOINC. Select the correct one to link.</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '.5rem' }}>
        {update.candidates.map(c => (
          <button key={c.id} className="btn btn-tertiary btn-sm" onClick={() => setLinked(c)}>
            {c.name} — LOINC: {c.loinc}
          </button>
        ))}
      </div>
    </div>
  );

  if (applied) return <div style={{ padding: '1rem' }}><Notif kind="success" msg="Changes applied to local catalog." /></div>;

  return (
    <div className="diff-panel">
      {update.matchType === 'new' && <Notif kind="info" msg="New tests are created as Inactive. Activate them in Test Catalog before use." />}
      {linked && linked.name && <Notif kind="info" msg={`Linked to: ${linked.name} (LOINC: ${linked.loinc})`} onClose={() => {}} />}

      {fields.length > 0 && (
        <table className="data-table sm" style={{ marginBottom: '1rem' }}>
          <thead><tr>
            <th style={{ width: '22%' }}>Field</th>
            <th>Local Value</th><th>Upstream Value</th><th style={{ width: '28%' }}>Decision</th>
          </tr></thead>
          <tbody>
            {fields.map(f => (
              <tr key={f.id} style={{ background: f.accepted === true ? '#defbe6' : f.accepted === false ? '#fff1f1' : '#fff' }}>
                <td style={{ fontWeight: 500 }}>{f.label}</td>
                <td>{f.local ? f.local : <span className="text-muted">(blank)</span>}</td>
                <td><span className="text-upstream">{f.upstream}</span></td>
                <td><FieldToggle id={f.id} value={f.accepted} onChange={v => setF(f.id, v)} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {bps.length > 0 && (
        <div className="accordion" style={{ marginBottom: '1rem' }}>
          <div className="accordion-hdr" onClick={() => setBpOpen(!bpOpen)}>
            <span>Conditions / Breakpoints ({bps.length} changed)</span><span>{bpOpen ? '▲' : '▼'}</span>
          </div>
          {bpOpen && (
            <div className="accordion-body">
              <table className="data-table sm">
                <thead><tr><th>Organism</th><th>Drug</th><th>Cat.</th><th>Local MIC</th><th>Upstream MIC</th><th></th><th>Decision</th></tr></thead>
                <tbody>
                  {bps.map(bp => (
                    <tr key={bp.id} style={{ background: bp.accepted === true ? '#defbe6' : bp.accepted === false ? '#fff1f1' : '#fff' }}>
                      <td><em>{bp.organism}</em></td><td>{bp.drug}</td><td><strong>{bp.cat}</strong></td>
                      <td>{bp.local ? bp.local : <span className="text-muted">(none)</span>}</td>
                      <td><span className="text-upstream">{bp.upstream}</span></td>
                      <td><span className={`tag tag-sm ${BP_TAG[bp.tag]}`}>{bp.tag === 'new' ? 'New' : bp.tag === 'removed' ? 'Removed' : 'Changed'}</span></td>
                      <td><FieldToggle id={bp.id} value={bp.accepted} onChange={v => setB(bp.id, v)} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      <div className="diff-actions">
        <button className="btn btn-primary btn-sm" onClick={() => { setApplied(true); setTimeout(onApply, 700); }}>Apply Decisions</button>
        <button className="btn btn-secondary btn-sm" onClick={acceptAll}>Accept All</button>
        <button className="btn btn-ghost btn-sm" onClick={rejectAll}>Reject All</button>
        <button className="btn btn-ghost-gray btn-sm" style={{ marginLeft: 'auto' }} onClick={onClose}>Collapse ▲</button>
      </div>
    </div>
  );
}

// ── Pending Updates Page ──────────────────────────────────────────────────────

function PendingUpdatesPage() {
  const [updates, setUpdates]   = useState(INIT_UPDATES);
  const [expanded, setExpanded] = useState(null);
  const [selected, setSelected] = useState([]);

  const applyUpdate  = id => { setUpdates(u => u.filter(x => x.id !== id)); setExpanded(null); };
  const toggleSelect = id => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const allSelected  = selected.length === updates.length && updates.length > 0;

  return (
    <div>
      {selected.length > 0 ? (
        <div className="batch-bar">
          <span>{selected.length} item{selected.length > 1 ? 's' : ''} selected</span>
          <button className="btn btn-ghost btn-sm" style={{ color: '#fff' }}
            onClick={() => { setUpdates(u => u.filter(x => !selected.includes(x.id))); setSelected([]); }}>
            🗑 Reject All Selected
          </button>
          <button className="btn btn-ghost btn-sm" style={{ color: '#a8a8a8', marginLeft: 'auto' }} onClick={() => setSelected([])}>Cancel</button>
        </div>
      ) : null}

      <div className="card">
        <p className="section-desc">Review field-level changes from subscribed catalogs. Accept or reject individual fields before applying updates to the local catalog.</p>
        <div className="toolbar">
          <input className="search-input" placeholder="Search pending updates…" />
          <span style={{ fontSize: 13, color: '#6f6f6f', marginLeft: 'auto' }}>{updates.length} update{updates.length !== 1 ? 's' : ''} pending</span>
        </div>

        {updates.length === 0 ? (
          <div className="empty-queue">
            <div style={{ fontSize: 32, marginBottom: '.5rem' }}>✓</div>
            <p style={{ fontWeight: 500, marginBottom: '.25rem' }}>All up to date</p>
            <p style={{ fontSize: 13 }}>No pending updates. Your catalog is synchronized.</p>
          </div>
        ) : (
          <table className="data-table">
            <thead><tr>
              <th style={{ width: 40 }}><input type="checkbox" checked={allSelected} onChange={e => setSelected(e.target.checked ? updates.map(u => u.id) : [])} /></th>
              <th>Resource</th><th>Type</th><th>Match</th><th>Subscription</th><th>Detected</th><th style={{ width: 160 }}></th>
            </tr></thead>
            <tbody>
              {updates.map(u => (
                <React.Fragment key={u.id}>
                  <tr className={expanded === u.id ? 'expanded' : ''}>
                    <td style={{ textAlign: 'center' }}><input type="checkbox" checked={selected.includes(u.id)} onChange={() => toggleSelect(u.id)} /></td>
                    <td style={{ fontWeight: 600 }}>{u.name}</td>
                    <td><span className={`tag tag-sm ${u.resourceType === 'PlanDefinition' ? 'tag-purple' : 'tag-blue'}`}>{u.resourceType}</span></td>
                    <td><span className={`tag tag-sm ${MATCH_TAG[u.matchType]}`}>{MATCH_LABEL[u.matchType]}</span></td>
                    <td style={{ fontSize: 13, color: '#525252' }}>{u.subscription}</td>
                    <td style={{ fontSize: 13 }}>{u.detected}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setExpanded(e => e === u.id ? null : u.id)}>
                          {expanded === u.id ? '▲ Collapse' : '▼ Review'}
                        </button>
                        <button className="btn btn-ghost btn-icon btn-sm" title="Reject" style={{ color: '#da1e28', fontSize: 14 }}
                          onClick={() => setUpdates(upd => upd.filter(x => x.id !== u.id))}>🗑</button>
                      </div>
                    </td>
                  </tr>
                  {expanded === u.id && (
                    <tr className="expanded">
                      <td colSpan={7} style={{ padding: 0 }}>
                        <DiffPanel update={u} onApply={() => applyUpdate(u.id)} onClose={() => setExpanded(null)} />
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

      <div className="snav-section">Advanced</div>
      <a className="snav-item" href="#">AMR Configuration</a>
      <a className="snav-item" href="#">Analyzer Integrations</a>
      <div className="snav-section">System</div>
      <a className="snav-item" href="#">Users &amp; Roles</a>
      <a className="snav-item" href="#">Audit Trail</a>
    </nav>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage]       = useState('subscriptions');
  const [navOpen, setNavOpen] = useState(true);
  const pendingCount = INIT_UPDATES.length;

  const crumbs = {
    subscriptions: 'Subscriptions',
    pending: 'Pending Updates',
  };

  return (
    <div style={{ display: 'flex', minHeight: 'calc(100vh - 48px)' }}>
      <SideNav page={page} setPage={setPage} pendingCount={pendingCount} open={navOpen} setOpen={setNavOpen} />
      <main style={{ flex: 1, padding: '2rem', background: '#f4f4f4', minWidth: 0 }}>
        <div className="breadcrumb">
          <a href="#">Admin</a><span>/</span>
          <a href="#">Test Management</a><span>/</span>
          <a onClick={() => setPage('subscriptions')}>Catalog Subscriptions</a><span>/</span>
          <span>{crumbs[page]}</span>
        </div>
        <h1 className="page-title">{crumbs[page]}</h1>
        <p className="page-sub">
          {page === 'subscriptions'
            ? HUB_CONNECTED ? `Connected to ${HUB_NAME} · Browse and subscribe to available catalogs, or add a custom FHIR endpoint.` : 'Add FHIR catalog endpoints to subscribe to upstream test definitions and clinical rules.'
            : `${pendingCount} update${pendingCount !== 1 ? 's' : ''} awaiting review. Accept or reject individual field changes before applying.`
          }
        </p>
        {page === 'subscriptions' && <SubscriptionsPage />}
        {page === 'pending'       && <PendingUpdatesPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- OpenELIS Design Gallery — microscope favicon -->
  <!-- Uses IBM Carbon blue (#0f62fe) to match the gallery theme -->
  <rect width="32" height="32" rx="6" fill="#0f62fe"/>
  <!-- Eyepiece -->
  <rect x="13" y="3" width="6" height="4" rx="1" fill="#fff"/>
  <!-- Body tube -->
  <rect x="14.5" y="7" width="3" height="8" rx="0.5" fill="#fff"/>
  <!-- Objective / nose piece -->
  <circle cx="16" cy="17" r="2.5" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- Stage -->
  <rect x="9" y="19.5" width="14" height="2" rx="1" fill="#fff"/>
  <!-- Arm -->
  <path d="M14.5 11 L11 11 L11 22" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base -->
  <rect x="7" y="25" width="18" height="3" rx="1.5" fill="#fff"/>
  <!-- Base pillar -->
  <rect x="10" y="21.5" width="2" height="4" rx="0.5" fill="#fff"/>
</svg>
